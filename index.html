<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gururaj's Dynamic Interview Prep Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <header class="bg-gradient-to-r from-slate-800 to-blue-950 text-white sticky top-0 z-50 shadow-md px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap text-xl text-cyan-400"></i>
            <h1 class="text-base font-bold tracking-tight">PrepPortal</h1>
        </div>
        
        <div class="relative">
            <select id="global-company-select" onchange="handleCompanyChange()" class="bg-slate-700 border border-slate-600 text-xs font-semibold px-3 py-1.5 rounded-lg text-white focus:outline-none focus:border-cyan-400">
                <option value="mizuho">Mizuho Group</option>
                <option value="general">General / Core .NET</option>
            </select>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <section class="mb-6">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                <i class="fa-solid fa-key text-cyan-600"></i> Active Master Focus Keywords
            </h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-layer-group text-blue-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Frontend</p><p class="text-sm font-bold text-slate-700">Angular 10+</p></div>
                </div>
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-cubes text-cyan-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Backend</p><p class="text-sm font-bold text-slate-700">.NET Core 7</p></div>
                </div>
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-cloud text-indigo-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Cloud</p><p class="text-sm font-bold text-slate-700">Azure Ecosystem</p></div>
                </div>
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-shield-halved text-emerald-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Security</p><p class="text-sm font-bold text-slate-700">OAuth2 / JWT</p></div>
                </div>
            </div>
        </section>

        <section class="mb-4">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                <i class="fa-solid fa-route text-cyan-600"></i> Track Target Stages
            </h2>
            <div class="grid grid-cols-5 gap-1 bg-slate-200 p-1 rounded-xl">
                <button onclick="switchRound('written')" id="btn-written" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[11px] font-medium transition-all bg-white text-blue-950 shadow-sm font-bold border-b-2 border-cyan-600">
                    <i class="fa-solid fa-pen-clip mb-1"></i>Written
                </button>
                <button onclick="switchRound('coding')" id="btn-coding" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[11px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-keyboard mb-1"></i>Coding
                </button>
                <button onclick="switchRound('tech')" id="btn-tech" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[11px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-code mb-1"></i>Tech
                </button>
                <button onclick="switchRound('functional')" id="btn-functional" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[11px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-briefcase mb-1"></i>Manager
                </button>
                <button onclick="switchRound('hr')" id="btn-hr" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[11px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-user-tie mb-1"></i>HR
                </button>
            </div>
        </section>

        <section id="qa-container" class="space-y-3 mb-6">
            </section>

        <section class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1">
                <i class="fa-solid fa-circle-plus text-cyan-600"></i> Expand Active Database
            </h3>
            <div class="space-y-2">
                <div class="text-[11px] text-slate-400 bg-slate-50 p-2 rounded border border-dashed border-slate-200">
                    Data saved below will append into your selected company: <span id="target-lbl" class="font-bold text-slate-700 capitalize">mizuho</span>
                </div>
                <select id="custom-round" class="w-full text-xs p-2.5 border border-slate-200 rounded-lg bg-slate-50">
                    <option value="written">Written Assessment</option>
                    <option value="coding">Coding Challenge Round</option>
                    <option value="tech">Technical Interview</option>
                    <option value="functional">Functional/Managerial Interview</option>
                    <option value="hr">HR Discussion</option>
                </select>
                <input type="text" id="custom-question" placeholder="Enter interview question..." class="w-full text-xs p-2.5 border border-slate-200 rounded-lg bg-slate-50 focus:outline-cyan-600">
                <textarea id="custom-answer" placeholder="Enter optimized response or code snippet..." rows="3" class="w-full text-xs p-2.5 border border-slate-200 rounded-lg bg-slate-50 focus:outline-cyan-600 font-mono"></textarea>
                <button onclick="saveCustomQA()" class="w-full bg-slate-800 text-white font-semibold text-xs py-2 rounded-lg hover:bg-slate-900 transition-colors">
                    Save to Device Memory
                </button>
            </div>
        </section>

    </main>

    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 shadow-lg px-6 py-3 flex justify-around items-center z-50">
        <a href="https://linkedin.com/in/qururaj-gidaveer" target="_blank" class="flex flex-col items-center text-slate-400 hover:text-blue-600">
            <i class="fa-brands fa-linkedin text-xl"></i><span class="text-[10px] mt-0.5">Profile</span>
        </a>
        <div class="bg-slate-50 border border-slate-200 px-4 py-1.5 rounded-full text-center">
            <span class="text-xs font-bold text-slate-700">Gururaj Gidaveer</span>
        </div>
        <button onclick="window.print()" class="flex flex-col items-center text-slate-400 hover:text-cyan-700">
            <i class="fa-solid fa-file-pdf text-xl"></i><span class="text-[10px] mt-0.5">Print CV</span>
        </button>
    </footer>

    <script>
        // Multi-company primary repository definition
        const masterData = {
            mizuho: {
                written: [
                    { q: "What is the key optimization value difference between an Indexed View and a standard View in SQL Server?", a: "Standard views run the underlying query dynamically every runtime. An Indexed View materializes and stores the physical data on disk, drastically minimizing CPU execution during large joins." },
                    { q: "Write a high-performance C# Linq expression to extract records matching a criteria safely.", a: "Use: `var output = dbContext.Users.AsNoTracking().Where(u => u.IsActive).ToList();` Adding `AsNoTracking()` bypasses EF core tracking overhead completely, slashing RAM usage." }
                ],
                coding: [
                    { 
                        q: "Implement a thread-safe LRU Cache in C# for low-latency reference data processing with O(1) performance constraints.", 
                        a: `<pre class="bg-slate-900 text-cyan-400 p-2.5 rounded-lg overflow-x-auto text-[11px] font-mono mt-1">
public class LRUCache {
    private readonly int capacity;
    private readonly Dictionary<int, LinkedListNode<CacheItem>> map;
    private readonly LinkedList<CacheItem> list;

    public LRUCache(int capacity) {
        this.capacity = capacity;
        map = new Dictionary<int, LinkedListNode<CacheItem>>();
        list = new LinkedList<CacheItem>();
    }

    public int Get(int key) {
        if (!map.ContainsKey(key)) return -1;
        var node = map[key];
        list.Remove(node);
        list.AddFirst(node);
        return node.Value.Value;
    }
}</pre>`
                    }
                ],
                tech: [
                    { q: "Mizuho Core Architecture: How do you securely handle communication authentication across modern Azure microservices?", a: "I configure API Gateways paired with JWT validation tokens and OAuth2 authorization workflows. Internal sensitive credentials are secure directly in Azure Key Vault utilizing Managed Identities." }
                ],
                functional: [
                    { q: "How would you design an architecture for a global banking payment platform to ensure 99.9% uptime?", a: "I deploy microservices to Azure App Services combined with Azure Traffic Manager across multi-region geographic failovers. Standardized Disaster Recovery (DR) drills evaluate Recovery Time Objectives (RTO)." }
                ],
                hr: [
                    { q: "Why do you want to transition your engineering career over to Mizuho Group specifically?", a: "Mizuho blends the foundational stability of an international banking titan with scalable tech growth. My 6 years building stable financial applications handling over 10k users aligns directly with driving the technical evolution of Corporate Services Technology." }
                ]
            },
            general: {
                written: [
                    { q: "What is the difference between Managed and Unmanaged resources in .NET?", a: "Managed resources are handled directly by the CLR Garbage Collector (e.g., standard object instantiations). Unmanaged resources encompass external system resources like file handles, database connections, or network sockets that require manual release via IDisposable." }
                ],
                coding: [
                    { q: "Write a high-performance C# method to reverse a string in place without allocating excess memory strings.", a: "<pre class='bg-slate-900 text-cyan-400 p-2.5 rounded-lg text-[11px] font-mono'>public string Reverse(string input) {\n    char[] arr = input.ToCharArray();\n    Array.Reverse(arr);\n    return new string(arr);\n}</pre>" }
                ],
                tech: [
                    { q: "Explain the internal mechanics of Middleware in ASP.NET Core pipelines.", a: "Middleware forms a sequential execution pipeline components processing Requests and Responses. Each component chooses whether to pass the execution token down to the next node using the `next()` delegate invoke structure." }
                ],
                functional: [
                    { q: "How do you systematically deal with Technical Debt during aggressive delivery deadlines?", a: "I capture technical debt in a structured tech log inside Jira backlog boards, attributing quantitative velocity risks to items. We negotiate a strict 15% space in every ongoing sprint cycle committed explicitly to technical codebase health refactoring." }
                ],
                hr: [
                    { q: "Where do you see your technical leadership capacity growing over the next 3 to 5 years?", a: "I see myself advancing into a Software Architect trajectory, guiding system infrastructure designs across cross-functional platforms while continuing to anchor core hands-on engineering strategies." }
                ]
            }
        };

        let currentActiveRound = 'written';
        let selectedCompany = 'mizuho';

        function loadQA() {
            const container = document.getElementById('qa-container');
            container.innerHTML = '';
            
            // Sync current configuration helper label
            document.getElementById('target-lbl').innerText = selectedCompany === 'mizuho' ? 'Mizuho Group' : 'General / Core .NET';

            // Fetch any custom overrides stored directly on phone
            let storageKey = `prep_portal_${selectedCompany}`;
            let customData = JSON.parse(localStorage.getItem(storageKey)) || { written:[], coding:[], tech:[], functional:[], hr:[] };
            
            let coreList = masterData[selectedCompany][currentActiveRound] || [];
            let extendedList = customData[currentActiveRound] || [];
            let combinedList = [...coreList, ...extendedList];

            if(combinedList.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-xs text-slate-400 border border-dashed rounded-xl bg-white">No questions stored for this round yet. Add one below to begin!</div>`;
                return;
            }

            combinedList.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-sm transition-all";
                card.innerHTML = `
                    <div class="flex gap-2.5 items-start">
                        <span class="bg-slate-100 text-slate-800 text-xs font-bold px-2 py-0.5 rounded-md mt-0.5">Q</span>
                        <p class="text-sm font-semibold text-slate-800 leading-snug">${item.q}</p>
                    </div>
                    <div class="mt-2.5 pt-2.5 border-t border-dashed border-slate-100 flex gap-2.5 items-start">
                        <span class="bg-emerald-50 text-emerald-800 text-xs font-bold px-2 py-0.5 rounded-md mt-0.5">A</span>
                        <div class="text-xs text-slate-600 leading-relaxed w-full">${item.a}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchRound(roundId) {
            currentActiveRound = roundId;
            document.querySelectorAll('.round-btn').forEach(btn => {
                btn.className = "round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[11px] font-medium transition-all text-slate-600";
            });
            const activeBtn = document.getElementById(`btn-${roundId}`);
            activeBtn.className = "round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[11px] font-medium transition-all bg-white text-blue-950 shadow-sm font-bold border-b-2 border-cyan-600";
            loadQA();
        }

        function handleCompanyChange() {
            selectedCompany = document.getElementById('global-company-select').value;
            loadQA();
        }

        function saveCustomQA() {
            const targetRound = document.getElementById('custom-round').value;
            const questionTxt = document.getElementById('custom-question').value.trim();
            const answerTxt = document.getElementById('custom-answer').value.trim();

            if(!questionTxt || !answerTxt) { alert('Please enter both a question and answer.'); return; }

            let storageKey = `prep_portal_${selectedCompany}`;
            let customData = JSON.parse(localStorage.getItem(storageKey)) || { written:[], coding:[], tech:[], functional:[], hr:[] };
            
            let processedAnswer = answerTxt;
            if(answerTxt.includes('{') && answerTxt.includes('}')) {
                processedAnswer = `<pre class="bg-slate-900 text-cyan-400 p-2.5 rounded-lg overflow-x-auto text-[11px] font-mono mt-1">${answerTxt.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>`;
            }

            customData[targetRound].push({ q: questionTxt, a: processedAnswer });
            localStorage.setItem(storageKey, JSON.stringify(customData));

            document.getElementById('custom-question').value = '';
            document.getElementById('custom-answer').value = '';
            
            alert(`Saved successfully into the ${selectedCompany.toUpperCase()} database context!`);
            if(targetRound === currentActiveRound) { loadQA(); }
        }

        window.onload = () => { loadQA(); };
    </script>
</body>
</html>
