<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Interview Preparation Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <header class="bg-gradient-to-r from-slate-900 to-blue-950 text-white sticky top-0 z-50 shadow-md px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap text-xl text-cyan-400"></i>
            <h1 class="text-base font-bold tracking-tight">PrepPortal</h1>
        </div>
        
        <div class="relative">
            <select id="global-company-select" onchange="handleCompanyChange()" class="bg-slate-700 border border-slate-600 text-xs font-semibold px-3 py-1.5 rounded-lg text-white focus:outline-none focus:border-cyan-400">
                <option value="mizuho">Mizuho Group Track</option>
                <option value="general">General / Architecture Track</option>
            </select>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <section class="mb-6">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                <i class="fa-solid fa-key text-cyan-600"></i> Master Focus Keywords
            </h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-layer-group text-blue-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Frontend Stack</p><p class="text-sm font-bold text-slate-700">Angular 10+</p></div>
                </div>
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-cubes text-cyan-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Backend Core</p><p class="text-sm font-bold text-slate-700">.NET Core 7</p></div>
                </div>
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-cloud text-indigo-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Cloud Platform</p><p class="text-sm font-bold text-slate-700">Azure Services</p></div>
                </div>
                <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <i class="fa-solid fa-shield-halved text-emerald-600 text-lg"></i>
                    <div><p class="text-xs text-slate-400">Security Gate</p><p class="text-sm font-bold text-slate-700">OAuth2 / JWT</p></div>
                </div>
            </div>
        </section>

        <section class="mb-4">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1">
                <i class="fa-solid fa-route text-cyan-600"></i> Track Target Stages
            </h2>
            <div class="grid grid-cols-5 gap-1 bg-slate-200 p-1 rounded-xl">
                <button onclick="switchRound('written')" id="btn-written" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[10px] font-medium transition-all bg-white text-blue-950 shadow-sm font-bold border-b-2 border-cyan-600">
                    <i class="fa-solid fa-pen-clip mb-1"></i>Written
                </button>
                <button onclick="switchRound('coding')" id="btn-coding" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[10px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-keyboard mb-1"></i>Coding
                </button>
                <button onclick="switchRound('tech')" id="btn-tech" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[10px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-code mb-1"></i>Tech
                </button>
                <button onclick="switchRound('functional')" id="btn-functional" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[10px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-briefcase mb-1"></i>Manager
                </button>
                <button onclick="switchRound('hr')" id="btn-hr" class="round-btn flex flex-col items-center justify-center py-2 px-0.5 text-center rounded-lg text-[10px] font-medium transition-all text-slate-600">
                    <i class="fa-solid fa-user-tie mb-1"></i>HR
                </button>
            </div>
        </section>

        <section id="qa-container" class="space-y-3 mb-6">
            </section>

        <section class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <h3 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1">
                <i class="fa-solid fa-circle-plus text-cyan-600"></i> Expand Active Database
            </h3>
            <div class="space-y-2">
                <div class="text-[11px] text-slate-400 bg-slate-50 p-2 rounded border border-dashed border-slate-200">
                    Data appended will map directly inside target system profile: <span id="target-lbl" class="font-bold text-slate-700">Mizuho Group Track</span>
                </div>
                <select id="custom-round" class="w-full text-xs p-2.5 border border-slate-200 rounded-lg bg-slate-50">
                    <option value="written">Written Assessment</option>
                    <option value="coding">Coding Challenge Round</option>
                    <option value="tech">Technical Interview</option>
                    <option value="functional">Functional/Managerial Interview</option>
                    <option value="hr">HR Discussion</option>
                </select>
                <input type="text" id="custom-question" placeholder="Enter interview question..." class="w-full text-xs p-2.5 border border-slate-200 rounded-lg bg-slate-50 focus:outline-cyan-600">
                <textarea id="custom-answer" placeholder="Enter optimized response or code block..." rows="3" class="w-full text-xs p-2.5 border border-slate-200 rounded-lg bg-slate-50 focus:outline-cyan-600 font-mono"></textarea>
                <button onclick="saveCustomQA()" class="w-full bg-slate-800 text-white font-semibold text-xs py-2 rounded-lg hover
